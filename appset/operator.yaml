apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: k8s-operator
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - cluster: in-cluster
            url: https://kubernetes.default.svc
  template:
    metadata:
      name: k8s-operator
    spec:
      project: default
      source:
        repoURL: https://github.com/bylucasqueiroz/kubernetes-operator
        targetRevision: main
        path: k8s
      destination:
        server: https://kubernetes.default.svc
        namespace: default
      syncPolicy:
        automated:
          prune: true
          selfHeal: true