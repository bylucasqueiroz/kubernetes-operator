apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-operator
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: argocd
  name: k8s-operator-role
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["applicationsets"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: k8s-operator-binding
  namespace: argocd
subjects:
  - kind: ServiceAccount
    name: k8s-operator
    namespace: default
roleRef:
  kind: Role
  name: k8s-operator-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-operator
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-operator
  template:
    metadata:
      labels:
        app: k8s-operator
    spec:
      serviceAccountName: k8s-operator
      containers:
        - name: app
          image: k8s-operator:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: k8s-operator
  namespace: default
spec:
  type: NodePort
  selector:
    app: k8s-operator
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30007