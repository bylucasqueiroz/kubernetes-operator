apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-operator
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-operator
  template:
    metadata:
      labels:
        app: k8s-operator
    spec:
      serviceAccountName: k8s-operator
      containers:
        - name: app
          image: k8s-operator:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8080