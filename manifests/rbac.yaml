apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-operator
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: argocd
  name: k8s-operator-role
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["applicationsets"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: k8s-operator-binding
  namespace: argocd
subjects:
  - kind: ServiceAccount
    name: k8s-operator
    namespace: default
roleRef:
  kind: Role
  name: k8s-operator-role
  apiGroup: rbac.authorization.k8s.io